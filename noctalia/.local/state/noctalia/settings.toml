[audio]
enable_sounds = true
sound_volume = 0.59999998658895493

[bar.default]
background_opacity = 0.27000000000000002
capsule = true
capsule_border = "shadow"
capsule_fill = "surface"
capsule_groups = [ "Monitor", "Other" ]
capsule_padding = 8.0
center = [ "taskbar", "recorder" ]
end = [ "notifications", "group:g2", "tray", "session" ]
margin_edge = 0.0
margin_ends = 0.0
padding = 8
panel_overlap = 0.0
radius = 0
start = [ "clock", "group:g1", "active_window" ]
thickness = 30
widget_spacing = 4

    [[bar.default.capsule_group]]
    border = "shadow"
    fill = "surface"
    id = "g1"
    members = [ "cpu", "ram", "temp", "network_rx", "network_tx" ]
    opacity = 1.0
    padding = 8.0

    [[bar.default.capsule_group]]
    border = "shadow"
    fill = "surface"
    id = "g2"
    members = [ "input_volume", "1", "volume", "1", "brightness", "1", "battery" ]
    opacity = 1.0
    padding = 8.0

[brightness]
enable_ddcutil = true

[control_center]
sidebar_section = "none"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

[desktop_widgets]
enabled = false
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
background_opacity = 0.99999997764825821
enabled = true
icon_size = 52
inactive_opacity = 1.0
inactive_scale = 1.0
item_spacing = 2
launcher_icon = "home"
launcher_position = "start"
magnification_scale = 1.25
margin_edge = 0
padding = 4
pinned = [ "librewolf", "org.vinegarhq.Sober", "thunar" ]
radius = 0
reserve_space = false
show_dots = true
show_instance_count = false

[idle]
behavior_order = [ "screen-off", "suspend", "lock" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = false
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 360

    [idle.behavior.suspend]
    action = "suspend"
    enabled = true
    lock_before_suspend = false
    timeout = 6000

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

[nightlight]
enabled = true
force = true
temperature_day = 10000
temperature_night = 5700
use_weather_location = false

[notification]
background_opacity = 0.80000000000000004

[osd]
background_opacity = 0.99999997764825821
keyboard_layout = false
lock_keys = false
offset_y = 12.0
position = "bottom_center"
scale = 1.05

    [osd.kinds]
    caffeine = false
    dnd = false
    keyboard_layout = false
    lock_keys = false

[plugin_settings."noctalia/screen_recorder"]
frame_rate = 30
quality = "medium"
replay_enabled = true
video_codec = "vp9"

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
clipboard_history_max_entries = 100.0
corner_radius_scale = 0.0
date_format = "%A, %b %d"
font_family = "Noto Sans Mono"
lang = "en"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = true
time_format = "%I:%M %p"

    [shell.panel]
    clipboard_placement = "attached"
    open_near_click_control_center = true
    open_near_click_wallpaper = true
    transparency_mode = "soft"

    [shell.screenshot]
    copy_to_clipboard = true

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "1"
    variant = "destructive"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "lock"
    enabled = false
    shortcut = "1"
    variant = "default"

    [shell.shadow]
    alpha = 0.63999998569488525

[system.monitor]
disk_poll_seconds = 7

[theme]
builtin = "Catppuccin"
community_palette = "One"
source = "community"

    [theme.templates]
    builtin_ids = [ "foot", "gtk3", "gtk4", "ghostty", "niri", "qt" ]
    community_ids = [ "fuzzel", "discord" ]

[wallpaper]
directory = "/home/diego/Pictures/Wallpapers"
edge_smoothness = 0.0
transition = [ "fade" ]
transition_duration = 100

    [wallpaper.default]
    path = "/home/diego/Pictures/Wallpapers/wallhaven_1j3x1g.jpg"

    [wallpaper.last]
    path = "/home/diego/Pictures/Wallpapers/wallhaven_1j3x1g.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/diego/Pictures/Wallpapers/wallhaven_1j3x1g.jpg"

[weather]
address = "Katy, Texas"
refresh_minutes = 240
unit = "imperial"

[widget.1]
capsule = true
capsule_group = "Other"
length = 10.0
type = "spacer"

[widget.active_window]
icon_size = 16.0
max_length = 250.0
title_scroll = "on_hover"

[widget.battery]
capsule = true
warning_threshold = 15

[widget.bongocat]
hot_reload = true
script = "scripts/bongocat.lua"
tappy_mode = true
type = "scripted"

[widget.brightness]
capsule = true

[widget.clock]
format = "%I:%M %p | %a %b %d"

[widget.cpu]
capsule = true
display = "text"
label_min_width = 26.0

[widget.input_volume]
capsule = true
capsule_group = "Other"

[widget.network_rx]
display = "graph"
label_min_width = 20
show_label = false

[widget.network_tx]
display = "graph"
label_min_width = 20
show_label = false

[widget.notifications]
capsule = true

[widget.ram]
capsule = true
capsule_group = "Monitor"
display = "text"
label_min_width = 27.0
stat = "ram_pct"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.session]
capsule = true

[widget.taskbar]
anchor = true

[widget.temp]
capsule = true
capsule_group = "Monitor"
display = "text"
label_min_width = 27.0

[widget.tray]
capsule = true
drawer = true
drawer_columns = 4
pinned = [ "Discord", "easyeffects" ]

[widget.volume]
capsule = true
capsule_group = "Other"